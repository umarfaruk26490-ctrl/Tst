<!DOCTYPE html><html lang="bn"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Sync Number Displayer</title><script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script><style>:root{--primary:#1a73e8;--bg:#f0f2f5;--card-bg:#fff;--danger:#d93025;--success:#28a745}body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);margin:0;padding:10px}.main-wrapper{display:flex;flex-direction:column;gap:20px;max-width:500px;margin:0 auto}.app-card{background:var(--card-bg);padding:20px;border-radius:15px;box-shadow:0 5px 20px rgba(0,0,0,0.1);text-align:center;position:relative}.icon-reset-main{position:absolute;top:15px;right:15px;background:#fff0f0;color:var(--danger);border:1px solid #ffcccc;width:30px;height:30px;border-radius:50%;display:flex;justify-content:center;align-items:center;cursor:pointer;font-size:14px;z-index:10}h2{color:var(--primary);font-size:18px;margin-bottom:15px;border-bottom:1px solid #eee;padding-bottom:10px;margin-top:5px}.display-screen{background:#111;color:#0f0;padding:35px 10px;border-radius:10px;font-size:32px;font-weight:700;margin:10px 0;cursor:pointer;min-height:45px;display:flex;justify-content:center;align-items:center;word-break:break-all}.stats{font-size:14px;color:#666;margin-bottom:10px}.copy-note{color:var(--success);font-size:14px;font-weight:700;height:20px;margin-bottom:10px;visibility:hidden}button.next-btn{width:100%;padding:16px;font-size:18px;font-weight:700;border:none;border-radius:10px;cursor:pointer;background:var(--primary);color:#fff;transition:all .2s}button.next-btn:disabled{background:#ccc;cursor:not-allowed;transform:none}.upload-slot{background:#f8f9fa;padding:8px 10px;border-radius:8px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;border:1px solid #eee}.dropdown-select{width:100%;padding:12px;margin-bottom:15px;border-radius:8px;border:2px solid #ddd}.upload-area{text-align:left;margin-top:20px;border-top:1px solid #eee;padding-top:15px}label{display:block;text-align:left;font-size:12px;color:#777;margin-bottom:5px}</style></head><body><div class="main-wrapper"><div class="app-card"><div class="icon-reset-main" id="clearSingleBtn">🗑</div><h2>সিঙ্গেল মোড (Shared)</h2><input type="file" id="singleFile" accept=".txt"><div class="display-screen" id="singleDisplay" onclick="manualCopy('singleDisplay','singleCopyMsg')">---</div><div class="copy-note" id="singleCopyMsg">অটো কপি হয়েছে!</div><div class="stats" id="singleStats">বাকি আছে: লোড হচ্ছে...</div><button class="next-btn" id="singleNext">Next Number</button></div><div class="app-card"><h2>মাল্টি-চ্যানেল মোড (Local)</h2><select class="dropdown-select" id="channelDropdown"></select><div class="display-screen" id="multiDisplay" onclick="manualCopy('multiDisplay','multiCopyMsg')">---</div><div class="copy-note" id="multiCopyMsg">কপি হয়েছে!</div><div class="stats" id="multiStats">বাকি আছে: 0 টি</div><button class="next-btn" id="multiNext">Next Number</button><div class="upload-area" id="multiUploads"></div></div></div><script type="module">import{initializeApp}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";import{getDatabase,ref,set,onValue,remove,runTransaction}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";const firebaseConfig={apiKey:"AIzaSyBPo_LJ17-NYHk3XdvszTDU1uMf1B-E5oc",authDomain:"number-a8deb.firebaseapp.com",projectId:"number-a8deb",storageBucket:"number-a8deb.firebasestorage.app",messagingSenderId:"906977890284",appId:"1:906977890284:web:b7dad4551244fc3526bac9",measurementId:"G-HC6L9GSCXX"};const app=initializeApp(firebaseConfig);const db=getDatabase(app);const singleListRef=ref(db,'single_mode_numbers');let activeMultiChannel=1;let isCooldown=!1;async function init(){const savedCh=await localforage.getItem('last_active_ch_v4');savedCh&&(activeMultiChannel=parseInt(savedCh));renderMultiLayout();updateLocalUI();onValue(singleListRef,(snapshot)=>{const data=snapshot.val();const count=data?data.length:0;document.getElementById('singleStats').innerText=`বাকি আছে: ${count} টি`;!isCooldown&&(document.getElementById('singleNext').disabled=count===0)})}async function handleNextSingle(){if(isCooldown)return;const nextBtn=document.getElementById('singleNext'),displayId=document.getElementById('singleDisplay');let grabbedNumber=null;try{const result=await runTransaction(singleListRef,currentData=>{if(currentData&&Array.isArray(currentData)&&currentData.length>0){grabbedNumber=currentData[0];return currentData.slice(1)}return currentData});if(result.committed&&grabbedNumber){displayId.innerText=grabbedNumber;autoCopyToClipboard(grabbedNumber,'singleCopyMsg');startCooldown(nextBtn)}else result.committed&&!grabbedNumber&&(displayId.innerText="শেষ!")}catch(e){console.error("Transaction failed:",e)}}function startCooldown(btn){isCooldown=!0;btn.disabled=!0;let timeLeft=3;const orig=btn.innerText;btn.innerText=`অপেক্ষা করুন (${timeLeft}s)`;const timer=setInterval(()=>{timeLeft--;if(timeLeft>0)btn.innerText=`অপেক্ষা করুন (${timeLeft}s)`;else{clearInterval(timer);isCooldown=!1;btn.innerText=orig;onValue(singleListRef,snapshot=>{const data=snapshot.val();btn.disabled=!(data&&data.length>0)},{onlyOnce:!0})}},1e3)}function autoCopyToClipboard(txt,msgId){if(!txt||txt==="---"||txt==="শেষ!")return;const ta=document.createElement("textarea");ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);const msg=document.getElementById(msgId);msg.style.visibility="visible";setTimeout(()=>msg.style.visibility="hidden",1500)}document.getElementById('singleFile').onchange=e=>{const file=e.target.files[0];if(!file)return;const reader=new FileReader;reader.onload=async ev=>{const lines=ev.target.result.split(/\r?\n/).map(l=>l.trim()).filter(l=>l!=="");await set(singleListRef,lines);alert("সফলভাবে "+lines.length+" টি নম্বর লোড হয়েছে।");e.target.value=""};reader.readAsText(file)};document.getElementById('clearSingleBtn').onclick=async()=>{confirm("আপনি কি নিশ্চিত যে ফায়ারবেসের সব নম্বর ডিলিট করবেন?")&&(await remove(singleListRef),document.getElementById('singleDisplay').innerText="---")};function renderMultiLayout(){const dropdown=document.getElementById('channelDropdown'),upContainer=document.getElementById('multiUploads');dropdown.innerHTML='';upContainer.innerHTML='<label>স্লট ব্যবস্থাপনা (লোকাল):</label>';for(let i=1;i<=10;i++){const opt=document.createElement('option');opt.value=i;opt.text=`চ্যানেল ${i}`;i===activeMultiChannel&&(opt.selected=!0);dropdown.appendChild(opt);const slot=document.createElement('div');slot.className='upload-slot';slot.innerHTML=`<span style="font-size:12px">স্লট ${i}</span><input type="file" id="file_${i}" style="width:140px;font-size:10px"><button onclick="clearLocalSlot(${i})" style="color:red;border:1px solid red;background:none;border-radius:4px;cursor:pointer">🗑</button>`;upContainer.appendChild(slot);document.getElementById(`file_${i}`).onchange=e=>uploadLocal(e,i)}dropdown.onchange=e=>{activeMultiChannel=parseInt(e.target.value);localforage.setItem('last_active_ch_v4',activeMultiChannel);updateLocalUI();document.getElementById('multiDisplay').innerText="---"}}async function uploadLocal(e,id){const file=e.target.files[0],reader=new FileReader;reader.onload=async ev=>{const lines=ev.target.result.split(/\r?\n/).map(l=>l.trim()).filter(l=>l!=="");await localforage.setItem(`list_multi_${id}`,lines);updateLocalUI()};reader.readAsText(file)}async function handleNextMulti(){const key=`list_multi_${activeMultiChannel}`;let list=await localforage.getItem(key);if(list&&list.length>0){const num=list.shift();document.getElementById('multiDisplay').innerText=num;autoCopyToClipboard(num,'multiCopyMsg');await localforage.setItem(key,list);updateLocalUI()}else document.getElementById('multiDisplay').innerText="শেষ!"}async function updateLocalUI(){const list=await localforage.getItem(`list_multi_${activeMultiChannel}`);document.getElementById('multiStats').innerText=`বাকি আছে: ${list?list.length:0} টি`}window.clearLocalSlot=async id=>{confirm(`স্লট ${id} ডিলিট করবেন?`)&&(await localforage.removeItem(`list_multi_${id}`),updateLocalUI())};window.manualCopy=(id,msgId)=>{const txt=document.getElementById(id).innerText;autoCopyToClipboard(txt,msgId)};document.getElementById('singleNext').onclick=handleNextSingle;document.getElementById('multiNext').onclick=handleNextMulti;init()</script></body></html>
